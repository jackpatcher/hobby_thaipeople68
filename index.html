  <script>
const populationData = [

  {"id":14,"province":"เชียงใหม่","thai_male":781326,"thai_female":863304,"non_thai_male":81527,"non_thai_female":78431,"total":1804588},
  {"id":15,"province":"ตรัง","thai_male":308550,"thai_female":328281,"non_thai_male":700,"non_thai_female":585,"total":638116},
  {"id":16,"province":"ตราด","thai_male":106634,"thai_female":109773,"non_thai_male":4640,"non_thai_female":4554,"total":225601},
  {"id":17,"province":"ตาก","thai_male":276634,"thai_female":276848,"non_thai_male":79561,"non_thai_female":72604,"total":705647},
  {"id":18,"province":"นครนายก","thai_male":127511,"thai_female":130868,"non_thai_male":751,"non_thai_female":607,"total":259737},

  {"id":20,"province":"นครพนม","thai_male":351206,"thai_female":355631,"non_thai_male":924,"non_thai_female":908,"total":708669},
  {"id":21,"province":"นครราชสีมา","thai_male":1275037,"thai_female":1338849,"non_thai_male":3243,"non_thai_female":3097,"total":2620226},
  {"id":22,"province":"นครศรีธรรมราช","thai_male":763522,"thai_female":784262,"non_thai_male":1608,"non_thai_female":1243,"total":1550635},
  {"id":23,"province":"นครสวรรค์","thai_male":488288,"thai_female":512688,"non_thai_male":1203,"non_thai_female":992,"total":1003171},
  {"id":24,"province":"นนทบุรี","thai_male":605728,"thai_female":706863,"non_thai_male":5221,"non_thai_female":4599,"total":1322411},
  {"id":25,"province":"นราธิวาส","thai_male":409314,"thai_female":418035,"non_thai_male":618,"non_thai_female":532,"total":828499}
];

const national = populationData[0];
const provinces = populationData.slice(1);
const maxPop = Math.max(...provinces.map(p => p.total));

let currentSort = 'pop';
let sortDir = -1;
let currentView = 'bar';
let searchTerm = '';

// Format number with commas
function fmt(n) { return n.toLocaleString('th-TH'); }
function pct(n, d) { return ((n / d) * 100).toFixed(1); }

// Default config
const defaultConfig = {
  main_title: 'สำมะโนประชากรไทย',
  subtitle: 'ปี พ.ศ. 2568',
  background_color: '#ffffff',
  surface_color: '#f9fafb',
  text_color: '#111827',
  primary_action_color: '#2563eb',
  secondary_action_color: '#7c3aed',
  font_family: 'IBM Plex Sans Thai',
  font_size: 14
};

function applyConfig(config) {
  const c = { ...defaultConfig, ...config };
  document.getElementById('mainTitle').textContent = c.main_title;
  document.getElementById('subtitle').textContent = c.subtitle;

  const root = document.documentElement;
  document.body.style.backgroundColor = c.background_color;
  document.body.style.color = c.text_color;

  document.querySelectorAll('.stat-card').forEach(el => {
    el.style.backgroundColor = c.surface_color;
    el.style.borderColor = '#e5e7eb';
  });

  const font = `${c.font_family}, Noto Sans Thai, sans-serif`;
  document.body.style.fontFamily = font;

  const base = c.font_size;
  document.getElementById('mainTitle').style.fontSize = `${base * 1.8}px`;
  document.getElementById('subtitle').style.fontSize = `${base}px`;
}



// Render summary cards
function renderSummary() {
  const cards = [
    { label: 'ชายไทย', value: national.thai_male, icon: 'user', accent: 'text-blue-700', borderColor: 'border-l-8 border-l-blue-600' },
    { label: 'หญิงไทย', value: national.thai_female, icon: 'user', accent: 'text-pink-700', borderColor: 'border-l-8 border-l-pink-600' },
    { label: 'ชายต่างชาติ', value: national.non_thai_male, icon: 'globe', accent: 'text-emerald-700', borderColor: 'border-l-8 border-l-emerald-600' },
    { label: 'หญิงต่างชาติ', value: national.non_thai_female, icon: 'globe', accent: 'text-amber-700', borderColor: 'border-l-8 border-l-amber-600' },
  ];
  document.getElementById('summaryCards').innerHTML = cards.map((c, i) => `
    <div class="stat-card bg-white rounded-xl p-4 fade-in shadow-md hover:shadow-lg" style="animation-delay:${i*80}ms; border-left: 8px solid ${c.borderColor.includes('blue') ? '#2563eb' : c.borderColor.includes('pink') ? '#db2777' : c.borderColor.includes('emerald') ? '#059669' : '#b45309'}; border: 1px solid #e5e7eb; border-left-width: 8px;">
      <div class="flex items-center gap-2 mb-2">
        <i data-lucide="${c.icon}" class="w-4 h-4 ${c.accent}"></i>
        <span class="text-xs text-gray-600">${c.label}</span>
      </div>
      <div class="text-lg sm:text-xl font-bold ${c.accent}">${fmt(c.value)}</div>
      <div class="text-[10px] text-gray-500 mt-1">${pct(c.value, national.total)}% ของทั้งหมด</div>
    </div>
  `).join('');
  lucide.createIcons();
}

// Format number with K notation
function fmtCompact(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(0) + 'K';
  return n.toString();
}

// Render highlight cards for top 3 values
function renderHighlights() {
  const categories = [
    {
      title: 'ประชากรไทยมากที่สุด',
      value: p => p.thai_male + p.thai_female,
      icon: 'crown',
      accent: 'text-purple-700',
      borderColor: 'border-l-purple-600'
    },
    {
      title: 'ต่างชาติมากที่สุด',
      value: p => p.non_thai_male + p.non_thai_female,
      icon: 'globe',
      accent: 'text-cyan-700',
      borderColor: 'border-l-cyan-600'
    },
    {
      title: 'ชายไทยมากที่สุด',
      value: p => p.thai_male,
      icon: 'user-check',
      accent: 'text-blue-700',
      borderColor: 'border-l-blue-600'
    },
    {
      title: 'หญิงไทยมากที่สุด',
      value: p => p.thai_female,
      icon: 'user-check',
      accent: 'text-pink-700',
      borderColor: 'border-l-pink-600'
    },
    {
      title: 'ชายต่างชาติมากที่สุด',
      value: p => p.non_thai_male,
      icon: 'globe',
      accent: 'text-emerald-700',
      borderColor: 'border-l-emerald-600'
    },
    {
      title: 'หญิงต่างชาติมากที่สุด',
      value: p => p.non_thai_female,
      icon: 'globe',
      accent: 'text-amber-700',
      borderColor: 'border-l-amber-600'
    },
  ];
  
  let allCards = '';
  let cardIndex = 0;
  
  categories.forEach((cat, catIdx) => {
    const sorted = [...provinces].sort((a, b) => cat.value(b) - cat.value(a)).slice(0, 3);
    
    const rows = sorted.map((data, rank) => `
      <div class="flex items-center justify-between py-2.5 px-3 border-t border-gray-100 first:border-t-0 cursor-pointer hover:bg-gray-50 transition-colors" onclick="showDetail(${data.id})">
        <div class="flex items-center gap-2">
          <span class="font-bold text-gray-400 w-4">${rank + 1}</span>
          <span class="font-medium text-gray-900 text-sm">${data.province}</span>
        </div>
        <span class="text-xs text-gray-500">${fmtCompact(cat.value(data))}</span>
      </div>
    `).join('');
    
    allCards += `
      <div class="stat-card bg-white border border-gray-200 ${cat.borderColor} border-l-4 rounded-xl p-3 fade-in shadow-md hover:shadow-lg" style="animation-delay:${cardIndex*40}ms">
        <div class="flex items-center gap-2 mb-3">
          <i data-lucide="${cat.icon}" class="w-4 h-4 ${cat.accent}"></i>
          <span class="text-xs font-medium text-gray-700">${cat.title}</span>
        </div>
        <div class="divide-y divide-gray-200">${rows}</div>
      </div>
    `;
    cardIndex++;
  });
  
  document.getElementById('highlightCards').innerHTML = allCards;
  lucide.createIcons();
}

// Get filtered/sorted data
function getData() {
  let data = [...provinces];
  if (searchTerm) {
    data = data.filter(p => p.province.includes(searchTerm));
  }
  if (currentSort === 'name') {
    data.sort((a, b) => sortDir * a.province.localeCompare(b.province, 'th'));
  } else {
    data.sort((a, b) => sortDir * (a.total - b.total));
  }
  return data;
}

// Render bar chart view
function renderBars(data) {
  if (!data.length) return '<div class="p-8 text-center text-gray-500">ไม่พบข้อมูล</div>';
  const borderColors = ['border-l-blue-500', 'border-l-purple-500', 'border-l-pink-500', 'border-l-emerald-500', 'border-l-amber-500', 'border-l-cyan-500', 'border-l-rose-500', 'border-l-indigo-500'];
  return `<div class="divide-y divide-gray-200">${data.map((p, i) => {
    const w = (p.total / maxPop) * 100;
    const thaiM = (p.thai_male / p.total) * 100;
    const thaiF = (p.thai_female / p.total) * 100;
    const nonM = (p.non_thai_male / p.total) * 100;
    const borderClass = borderColors[i % borderColors.length];
    return `
    <div class="row-hover border-l-4 ${borderClass} px-4 py-2.5 cursor-pointer" onclick="showDetail(${p.id})">
      <div class="flex items-center justify-between mb-1.5">
        <span class="text-sm font-medium text-gray-900">${p.province}</span>
        <span class="text-xs font-mono text-gray-600">${fmt(p.total)}</span>
      </div>
      <div class="h-3 rounded-full overflow-hidden bg-gray-200 bar-animate" style="width:${w}%;animation-delay:${i*30}ms">
        <div class="h-full flex">
          <div style="width:${thaiM}%" class="bg-blue-600"></div>
          <div style="width:${thaiF}%" class="bg-pink-500"></div>
          <div style="width:${nonM}%" class="bg-emerald-500"></div>
          <div class="flex-1 bg-amber-500"></div>
        </div>
      </div>
    </div>`;
  }).join('')}</div>
  <div class="px-4 py-3 border-t border-gray-200 flex flex-wrap gap-4 text-[10px] text-gray-600">
    <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded bg-blue-600"></span>ชายไทย</span>
    <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded bg-pink-500"></span>หญิงไทย</span>
    <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded bg-emerald-500"></span>ชายต่างชาติ</span>
    <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded bg-amber-500"></span>หญิงต่างชาติ</span>
  </div>`;
}

// Render table view
function renderTable(data) {
  if (!data.length) return '<div class="p-8 text-center text-gray-500">ไม่พบข้อมูล</div>';
  const borderColors = ['border-l-blue-500', 'border-l-purple-500', 'border-l-pink-500', 'border-l-emerald-500', 'border-l-amber-500', 'border-l-cyan-500', 'border-l-rose-500', 'border-l-indigo-500'];
  return `
  <div class="overflow-x-auto">
    <table class="w-full text-xs sm:text-sm">
      <thead>
        <tr class="text-left text-gray-600 border-b border-gray-200 bg-gray-50">
          <th class="px-4 py-3 font-medium">จังหวัด</th>
          <th class="px-3 py-3 font-medium text-right">ชายไทย</th>
          <th class="px-3 py-3 font-medium text-right">หญิงไทย</th>
          <th class="px-3 py-3 font-medium text-right hidden sm:table-cell">ชาย ตปท.</th>
          <th class="px-3 py-3 font-medium text-right hidden sm:table-cell">หญิง ตปท.</th>
          <th class="px-3 py-3 font-medium text-right">รวม</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-200">
        ${data.map((p, i) => `
        <tr class="row-hover border-l-4 ${borderColors[i % borderColors.length]} cursor-pointer" onclick="showDetail(${p.id})">
          <td class="px-4 py-2.5 font-medium text-gray-900">${p.province}</td>
          <td class="px-3 py-2.5 text-right text-blue-700 font-mono">${fmt(p.thai_male)}</td>
          <td class="px-3 py-2.5 text-right text-pink-600 font-mono">${fmt(p.thai_female)}</td>
          <td class="px-3 py-2.5 text-right text-emerald-700 font-mono hidden sm:table-cell">${fmt(p.non_thai_male)}</td>
          <td class="px-3 py-2.5 text-right text-amber-700 font-mono hidden sm:table-cell">${fmt(p.non_thai_female)}</td>
          <td class="px-3 py-2.5 text-right font-bold text-gray-900 font-mono">${fmt(p.total)}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

function render() {
  const data = getData();
  const container = document.getElementById('dataContainer');
  container.innerHTML = currentView === 'bar' ? renderBars(data) : renderTable(data);
  document.getElementById('resultCount').textContent = `แสดง ${data.length} จาก ${provinces.length} จังหวัด`;

  // Update button states
  const activeBtn = 'border-blue-600 bg-blue-50 text-blue-600';
  const inactiveBtn = 'border-gray-300 bg-white text-gray-700';
  document.getElementById('btnViewBar').className = `px-3 py-2 text-xs rounded-lg border transition-colors flex items-center gap-1.5 ${currentView === 'bar' ? activeBtn : inactiveBtn}`;
  document.getElementById('btnViewTable').className = `px-3 py-2 text-xs rounded-lg border transition-colors flex items-center gap-1.5 ${currentView === 'table' ? activeBtn : inactiveBtn}`;
  document.getElementById('btnSortPop').className = `px-3 py-2 text-xs rounded-lg border transition-colors flex items-center gap-1.5 ${currentSort === 'pop' ? activeBtn : inactiveBtn}`;
  document.getElementById('btnSortName').className = `px-3 py-2 text-xs rounded-lg border transition-colors flex items-center gap-1.5 ${currentSort === 'name' ? activeBtn : inactiveBtn}`;

  lucide.createIcons();
}

function setSort(type) {
  if (currentSort === type) sortDir *= -1;
  else { currentSort = type; sortDir = type === 'name' ? 1 : -1; }
  render();
}

function setView(v) { currentView = v; render(); }

function showDetail(id) {
  const p = populationData.find(d => d.id === id);
  if (!p) return;
  const thaiTotal = p.thai_male + p.thai_female;
  const nonThaiTotal = p.non_thai_male + p.non_thai_female;
  const maleTotal = p.thai_male + p.non_thai_male;
  const femaleTotal = p.thai_female + p.non_thai_female;

  document.getElementById('modalContent').innerHTML = `
    <h2 class="text-xl font-bold text-gray-900 mb-1">${p.province}</h2>
    <p class="text-2xl font-bold text-blue-600 mb-5">${fmt(p.total)} <span class="text-sm text-gray-500">คน</span></p>
    
    <div class="space-y-4">
      <div>
        <div class="flex justify-between text-xs text-gray-600 mb-1.5"><span>ชาย / หญิง</span><span>${pct(maleTotal, p.total)}% / ${pct(femaleTotal, p.total)}%</span></div>
        <div class="h-4 rounded-full overflow-hidden bg-gray-200 flex">
          <div class="bg-blue-600" style="width:${pct(maleTotal, p.total)}%"></div>
          <div class="bg-pink-500 flex-1"></div>
        </div>
        <div class="flex justify-between text-[10px] text-gray-600 mt-1"><span>${fmt(maleTotal)}</span><span>${fmt(femaleTotal)}</span></div>
      </div>
      
      <div>
        <div class="flex justify-between text-xs text-gray-600 mb-1.5"><span>ไทย / ต่างชาติ</span><span>${pct(thaiTotal, p.total)}% / ${pct(nonThaiTotal, p.total)}%</span></div>
        <div class="h-4 rounded-full overflow-hidden bg-gray-200 flex">
          <div class="bg-purple-600" style="width:${pct(thaiTotal, p.total)}%"></div>
          <div class="bg-emerald-500 flex-1"></div>
        </div>
        <div class="flex justify-between text-[10px] text-gray-600 mt-1"><span>${fmt(thaiTotal)}</span><span>${fmt(nonThaiTotal)}</span></div>
      </div>

      <div class="grid grid-cols-2 gap-2 pt-2">
        <div class="bg-blue-50 rounded-lg p-3 border border-blue-200">
          <div class="text-[10px] text-gray-600 mb-1">ชายไทย</div>
          <div class="text-sm font-bold text-blue-700">${fmt(p.thai_male)}</div>
        </div>
        <div class="bg-pink-50 rounded-lg p-3 border border-pink-200">
          <div class="text-[10px] text-gray-600 mb-1">หญิงไทย</div>
          <div class="text-sm font-bold text-pink-700">${fmt(p.thai_female)}</div>
        </div>
        <div class="bg-emerald-50 rounded-lg p-3 border border-emerald-200">
          <div class="text-[10px] text-gray-600 mb-1">ชายต่างชาติ</div>
          <div class="text-sm font-bold text-emerald-700">${fmt(p.non_thai_male)}</div>
        </div>
        <div class="bg-amber-50 rounded-lg p-3 border border-amber-200">
          <div class="text-[10px] text-gray-600 mb-1">หญิงต่างชาติ</div>
          <div class="text-sm font-bold text-amber-700">${fmt(p.non_thai_female)}</div>
        </div>
      </div>
    </div>
  `;
  document.getElementById('modal').classList.remove('hidden');
  lucide.createIcons();
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
}

// Search
document.getElementById('searchInput').addEventListener('input', (e) => {
  searchTerm = e.target.value.trim();
  render();
});

// Keyboard close modal
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// Init
renderSummary();
renderHighlights();
render();
</script>
